<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Bibliothèque Numérique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>📚 Bibliothèque Numérique</h2>

    <div class="login-box">
        <h3 style="margin:0 0 15px 0; font-size:16px; color:#333;">Connexion</h3>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Mot de passe">

        <p class="role-text">Se connecter comme :</p>

        <div class="roles">
            <label>
                <input type="radio" name="loginRole" value="user" checked>
                Utilisateur
            </label>
            <label>
                <input type="radio" name="loginRole" value="admin">
                Administrateur
            </label>
        </div>

        <button onclick="login()">Se Connecter</button>

        <p id="message"></p>

        <p class="switch-link">
            Pas encore de compte ? <a href="register.html">S'inscrire</a>
        </p>
    </div>
</div>

<script src="js.js"></script>
</body>
</html>
